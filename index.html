<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: flex; gap: 2rem; }
        .sidebar { width: 250px; }
        .main { flex: 1; }
        ul { list-style: none; padding: 0; margin: 0 0 1rem 0; }
        li { padding: 0.5rem; background: #f5f5f5; margin-bottom: 4px; cursor: pointer; border-radius: 4px; display: flex; justify-content: space-between; }
        li:hover { background: #e0e0e0; }
        .active { background: #d0d0ff; font-weight: bold; }
        button { padding: 0.5rem 1rem; margin-right: 0.5rem; cursor: pointer; }
        textarea { width: 100%; height: 400px; font-family: monospace; padding: 0.5rem; }
        .raw-link { margin-top: 0.5rem; font-size: 0.9rem; word-break: break-all; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>📜 Script Keeper</h1>
    <div class="grid">
        <div class="sidebar">
            <h3>Scripts</h3>
            <button id="newBtn">➕ New</button>
            <ul id="scriptList"></ul>
            <p><small>Click a script to edit.</small></p>
        </div>
        <div class="main">
            <h3>Editor</h3>
            <input type="text" id="scriptName" placeholder="Script name (without extension)" />
            <textarea id="scriptContent" placeholder="-- your code here"></textarea>
            <div>
                <button id="saveBtn">💾 Save</button>
                <button id="deleteBtn">🗑️ Delete</button>
            </div>
            <div id="rawLinkContainer" class="raw-link"></div>
        </div>
    </div>
    <script>
        const API_BASE = '/api/scripts';
        let currentId = null;

        async function loadList() {
            const res = await fetch(API_BASE);
            const scripts = await res.json();
            const list = document.getElementById('scriptList');
            list.innerHTML = '';
            scripts.forEach(s => {
                const li = document.createElement('li');
                li.textContent = s.name;
                li.dataset.id = s.id;
                if (s.id === currentId) li.classList.add('active');
                li.addEventListener('click', () => loadScript(s.id));
                const delBtn = document.createElement('span');
                delBtn.textContent = ' ❌';
                delBtn.style.cursor = 'pointer';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteScript(s.id); };
                li.appendChild(delBtn);
                list.appendChild(li);
            });
        }

        async function loadScript(id) {
            const res = await fetch(`${API_BASE}/${id}`);
            const script = await res.json();
            document.getElementById('scriptName').value = script.name;
            document.getElementById('scriptContent').value = script.content;
            currentId = id;
            const rawUrl = `${window.location.origin}/raw/${id}`;
            document.getElementById('rawLinkContainer').innerHTML = `🔗 Raw: <a href="${rawUrl}" target="_blank">${rawUrl}</a>`;
            loadList();
        }

        async function saveScript() {
            const name = document.getElementById('scriptName').value.trim();
            const content = document.getElementById('scriptContent').value;
            if (!name) return alert('Please enter a script name');
            const method = currentId ? 'PUT' : 'POST';
            const url = currentId ? `${API_BASE}/${currentId}` : API_BASE;
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, content })
            });
            if (res.ok) {
                const script = await res.json();
                currentId = script.id;
                loadList();
                loadScript(currentId);
            } else {
                alert('Save failed');
            }
        }

        async function deleteScript(id) {
            if (!confirm('Delete this script?')) return;
            const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
            if (res.ok) {
                if (id === currentId) {
                    document.getElementById('scriptName').value = '';
                    document.getElementById('scriptContent').value = '';
                    document.getElementById('rawLinkContainer').innerHTML = '';
                    currentId = null;
                }
                loadList();
            } else {
                alert('Delete failed');
            }
        }

        document.getElementById('newBtn').addEventListener('click', () => {
            document.getElementById('scriptName').value = '';
            document.getElementById('scriptContent').value = '';
            document.getElementById('rawLinkContainer').innerHTML = '';
            currentId = null;
        });

        document.getElementById('saveBtn').addEventListener('click', saveScript);
        document.getElementById('deleteBtn').addEventListener('click', () => {
            if (currentId) deleteScript(currentId);
        });

        loadList();
    </script>
</body>
</html>
